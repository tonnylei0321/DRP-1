services:
  graphdb:
    image: ontotext/graphdb:10.7.0
    container_name: drp-graphdb
    ports:
      - "7200:7200"
    environment:
      GDB_HEAP_SIZE: "2g"
      GDB_MIN_MEM: "512m"
    volumes:
      - graphdb-data:/opt/graphdb/home
    networks:
      - drp-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7200/rest/repositories"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  graphdb-init:
    image: curlimages/curl:8.7.1
    container_name: drp-graphdb-init
    depends_on:
      graphdb:
        condition: service_healthy
    volumes:
      - ./infra/graphdb/init:/init
      - ./infra/graphdb/fibo:/fibo
    entrypoint: ["/bin/sh", "/init/01-create-repo.sh"]
    networks:
      - drp-net
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: drp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: drp
      POSTGRES_USER: drp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drp_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - drp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drp -d drp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: drp-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - drp-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  drp-net:
    driver: bridge

volumes:
  graphdb-data:
  postgres-data:
  redis-data:
