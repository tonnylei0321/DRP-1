services:
  graphdb:
    image: ontotext/graphdb:10.7.0
    container_name: drp-graphdb
    # 15.2 安全加固：生产环境删除此 ports 映射，仅通过内部网络 drp-net 访问
    # 开发环境保留端口映射便于调试（生产环境使用 docker-compose.prod.yml 覆盖）
    ports:
      - "127.0.0.1:7201:7200"  # 绑定 localhost，禁止公网直接访问
    environment:
      GDB_HEAP_SIZE: "2g"
      GDB_MIN_MEM: "512m"
    volumes:
      - graphdb-data:/opt/graphdb/home
    networks:
      - drp-internal  # 仅加入内部网络，不加入外部网络
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7200/rest/repositories"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  graphdb-init:
    image: curlimages/curl:8.7.1
    container_name: drp-graphdb-init
    depends_on:
      graphdb:
        condition: service_healthy
    volumes:
      - ./infra/graphdb/init:/init
      - ./infra/graphdb/fibo:/fibo
    entrypoint: ["/bin/sh", "/init/01-create-repo.sh"]
    networks:
      - drp-internal
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: drp-postgres
    ports:
      - "127.0.0.1:5433:5432"  # 绑定 localhost，禁止公网直接访问
    environment:
      POSTGRES_DB: drp
      POSTGRES_USER: drp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drp_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - drp-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drp -d drp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: drp-redis
    ports:
      - "127.0.0.1:6380:6379"  # 绑定 localhost，禁止公网直接访问
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --save 900 1
      --save 300 10
    volumes:
      - redis-data:/data
    networks:
      - drp-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  drp-internal:
    driver: bridge
    internal: false  # 开发环境允许出站（用于拉取依赖）；生产环境设为 true 并单独配置出口网络

volumes:
  graphdb-data:
  postgres-data:
  redis-data:
