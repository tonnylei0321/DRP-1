name: OpenSpec Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  validate-openspec:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        cd backend
        pip install -e ".[dev]"
    
    - name: Generate OpenAPI specification
      run: |
        cd backend
        python -m openspec.scripts.generate_openapi
    
    - name: Validate OpenAPI specification
      run: |
        cd backend
        python -m openspec.scripts.validate_openapi
    
    - name: Run OpenAPI tests
      run: |
        cd backend
        python -m pytest openspec/tests/ -v
    
    - name: Upload OpenAPI specification
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: openapi-spec
        path: |
          backend/openspec/openapi.json
          backend/openspec/openapi.yaml
        retention-days: 7

  property-test:
    runs-on: ubuntu-latest
    needs: validate-openspec
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        cd backend
        pip install -e ".[dev]"
    
    - name: Start application
      run: |
        cd backend
        uvicorn drp.main:app --host 0.0.0.0 --port 8000 &
        sleep 5
    
    - name: Run property-based tests with schemathesis
      run: |
        cd backend
        schemathesis run --checks all http://localhost:8000/openapi.json \
          --hypothesis-max-examples=10 \
          --hypothesis-deadline=5000 \
          --validate-schema=false
    
    - name: Stop application
      run: |
        pkill -f "uvicorn drp.main:app" || true